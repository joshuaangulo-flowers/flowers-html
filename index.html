<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="assets/css/main.css" />
</head>
<body>
    <div class="mini-menu">
        <ul>
            <li><a href="dashboard/">Dashboard</a></li>
            <li><a href="planning-tree/">My Planning Tree</a></li>
            <li><a href="remembrance-plan/">My Remembrance Plan</a></li>
            <li><a href="vault-boxes/">My Vault Boxes</a></li>
            <li><a href="plan-protectors/">My Plan Protectors</a></li>
            <li><a href="settings/">Settings</a></li>
        </ul>
    </div>

    <div id="onboarding-view">
        <!-- Header -->
        <div class="ob-header">
            <div class="ob-logo">Rempla</div>
            <div class="ob-login-link">Do not have an account? <span style="color:#c9a96e;">Sign Up →</span></div>
        </div>

        <div class="ob-body" id="ob-body">

    <!-- ── STEP 1: Create Account ── -->
    <div class="ob-panel" id="ob-panel-1" style="display: block; animation: 0.4s ease 0s 1 normal none running obPanelIn;">
      <div class="ob-panel-eyebrow">Login</div>
      <div class="ob-panel-title">Welcome to Rempla</div>

      <div class="ob-field">
        <label class="ob-label">Email Address *</label>
        <input class="ob-input" type="email" id="ob-email" placeholder="your@email.com">
        <div class="ob-error-text" id="ob-email-error">Please enter a valid email address.</div>
      </div>

      <div class="ob-field">
        <label class="ob-label">Password *</label>
        <div class="ob-input-group">
          <input class="ob-input" type="password" id="ob-password" placeholder="Type your password">
          <button class="ob-input-toggle" onclick="obTogglePassword('ob-password')">
            <svg style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </button>
        </div>
        <div class="ob-error-text" id="ob-password-error">Password is incorrect.</div>
      </div>
      <div class="ob-terms-error show" id="ob-terms-error"><a href="#">Forgot your password?</a></div>

      <button class="ob-btn-primary" id="ob-btn-step1" onclick="obLogIn()">Enter →</button>

      <div class="ob-security-badge">
        <svg style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:1.8;" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0110 0v4"></path></svg>
        256-bit encryption
      </div>
    </div>

  </div>
    </div>

    <script>
        // Your JavaScript code here
        function obTogglePassword(id) {
            var input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function obLogIn() {
            var email = document.getElementById('ob-email').value;
            var password = document.getElementById('ob-password').value;
            var emailError = document.getElementById('ob-email-error');
            var passwordError = document.getElementById('ob-password-error');

            // Simple email validation
            var emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email)) {
                emailError.style.display = 'block';
                document.querySelector('#ob-email').classList.add('error');
                document.querySelector('#ob-email').focus();
                return;
            } else {
                emailError.style.display = 'none';
                document.querySelector('#ob-email').classList.remove('error');
            }

            // Simulate login process (replace with actual authentication logic)
            if (password !== '' && password.length >= 8) {
                passwordError.style.display = 'none';
                document.querySelector('#ob-password').classList.remove('error');
            } else {
                passwordError.style.display = 'block';
                document.querySelector('#ob-password').classList.add('error');
                document.querySelector('#ob-password').focus();
                return
            }

            window.location.href = 'dashboard/';
        }
    </script>
</body>
</html>
